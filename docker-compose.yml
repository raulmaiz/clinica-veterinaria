version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: clinica_db
    environment:
      POSTGRES_DB: clinica_veterinaria
      POSTGRES_USER: clinica_user
      POSTGRES_PASSWORD: clinica_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - clinica_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinica_user -d clinica_veterinaria"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: clinica_backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/clinica_veterinaria
      SPRING_DATASOURCE_USERNAME: clinica_user
      SPRING_DATASOURCE_PASSWORD: clinica_pass
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - clinica_network

  frontend:
    build: ./frontend
    container_name: clinica_frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - clinica_network

volumes:
  postgres_data:

networks:
  clinica_network:
    driver: bridge
